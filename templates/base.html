<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>{{ site_title }}</title>
  <meta name="description" content="{{ site_description }}">
  <link rel="canonical" href="{{ site_url }}/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site_name }}">
  <meta property="og:title" content="{{ site_title }}">
  <meta property="og:description" content="{{ site_description }}">
  <meta property="og:url" content="{{ site_url }}">
  <meta property="og:image" content="{{ site_url }}/favicon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ site_title }}">
  <meta name="twitter:description" content="{{ site_description }}">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "{{ site_name }}",
      "alternateName": "Goon To This",
      "url": "{{ site_url }}/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ site_url }}/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <script data-goatcounter="{{ goatcounter_site }}" async src="{{ goatcounter_src }}"></script>
  <script defer src="{{ url_for('static', filename='site.js') }}"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
