<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>{{ site_title }}</title>
  <meta name="description" content="{{ site_description }}">
  <meta name="theme-color" content="#010501">
  <link rel="canonical" href="{{ canonical_url }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site_name }}">
  <meta property="og:title" content="{{ site_title }}">
  <meta property="og:description" content="{{ site_description }}">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta property="og:image" content="{{ og_image }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ site_title }}">
  <meta name="twitter:description" content="{{ site_description }}">
  <meta name="twitter:image" content="{{ og_image }}">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "{{ site_name }}",
      "alternateName": "Goon To This",
      "url": "{{ site_url }}/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ site_url }}/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon-192.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}?v=deck6">
  <noscript>
    <style>
      .boot,#mx{display:none!important}
      .home{overflow:auto!important}
      .home-wrap,.signal{opacity:1!important;filter:none!important}
    </style>
  </noscript>
  <script data-goatcounter="{{ goatcounter_site }}" async src="{{ goatcounter_src }}"></script>
  <script defer src="{{ url_for('static', filename='site.js') }}?v=deck6"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
